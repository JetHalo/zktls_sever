# TLSNotary Notary Server configuration for VerifyTrade
#
# Reference: https://github.com/tlsnotary/tlsn/blob/main/crates/notary/server/config/config.yaml

server:
  name: "verifytrade-notary"
  host: "0.0.0.0"
  port: 7047
  html_info: "VerifyTrade Notary Server — running on Railway"

notarization:
  # Maximum size of a single notarization session (bytes).
  # TLSNotary has ~20MB MPC overhead per session, so set comfortably above that.
  max_sent_data: 4096
  max_recv_data: 16384

tls:
  # Railway terminates TLS at its proxy, so the notary itself runs HTTP.
  # Clients connect via wss:// to Railway's public URL.
  enabled: false

# Notary signing key.
# In production, set via NOTARY_SIGNING_KEY_PEM environment variable
# (or mount as a file). DO NOT commit a real key.
notary_key:
  private_key_pem_path: "/app/keys/notary.key"
  public_key_pem_path:  "/app/keys/notary.pub"

logging:
  level: "info"
  format: "json"

authorization:
  # Whitelist mode (disabled = anyone can request notarization).
  # For a public workshop demo, keep disabled. For private deployment, enable + add API keys.
  enabled: false
